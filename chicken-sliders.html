<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chicken Sliders</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container recipe-page">
    <a class="back-link" href="index.html">← Back to all recipes</a>

    <img class="recipe-hero-image" src="images/chicken-sliders.jpg" alt="Chicken Sliders" />

    <h1 class="recipe-title">Chicken Sliders</h1>

    <div class="recipe-meta">
      <span>Burgers</span>
      <span>Party Food</span>
      <span>Prep: 40 min</span>
    </div>

    <div class="recipe-layout">
      <section class="recipe-box">
        <h2>Ingredients</h2>
        <ul>
          <li>Chicken</li>
          <li>Slider buns</li>
          <li>Cheese</li>
          <li>Sauce</li>
          <li>Salad</li>
        </ul>
      </section>

      <section class="recipe-box">
        <h2>Instructions</h2>
        <ol>
          <li>Cook the chicken until fully done.</li>
          <li>Toast the buns lightly.</li>
          <li>Assemble with sauce, cheese, and salad.</li>
          <li>Serve warm.</li>
        </ol>
      </section>
    </div>
  </main>
