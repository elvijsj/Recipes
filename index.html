<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipes</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-overlay">
      <div class="container">
        <h1 class="site-title">Recipes</h1>
        <p class="site-subtitle">My own perfected recipes</p>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="section-header">
      <h2>All Recipes</h2>
      <p>Click a recipe to open it</p>
    </section>

    <section class="recipe-grid">
     <a class="recipe-card" href="chicken-rice-asparagus.html">
      <img src="images/Chicken-Rice-Asparagus.jpg" alt="Chicken Rice and Asparagus" />
        <div class="card-content">
          <h3>Chicken Rice and Asparagus</h3>
          <div class="tags">
            <span>Chicken</span>
            <span>Dinner</span>
          </div>
        </div>
      </a>


      <a class="recipe-card" href="chicken-sliders.html">
        <img src="images/Chicken-Sliders.jpeg" alt="Chicken Sliders" />
        <div class="card-content">
          <h3>Chicken Sliders</h3>
          <div class="tags">
            <span>Burgers</span>
            <span>Party Food</span>
          </div>
        </div>
      </a>

      <a class="recipe-card" href="pulled-pork.html">
        <img src="images/Pulled-Pork.jpg" alt="Pulled Pork" />
        <div class="card-content">
          <h3>Pulled Pork</h3>
          <div class="tags">
            <span>Slow Cook</span>
            <span>Meat</span>
          </div>
        </div>
      </a>

      <a class="recipe-card" href="dumplings.html">
        <img src="images/Dumplings.jpeg" alt="Dumplings" />
        <div class="card-content">
          <h3>Dumplings</h3>
          <div class="tags">
            <span>Comfort Food</span>
            <span>Latvian</span>

      <a class="recipe-card" href="brisket.html">
        <img src="images/Brisket4.jpeg" alt="Brisket" />
        <div class="card-content">
          <h3>Brisket-Beef Loin</h3>
          <div class="tags">
            <span>Festivity</span>
            <span>Meat</span>
          </div>
        </div>
      </a>

      <a class="recipe-card" href="burnt-pork-ends.html">
        <img src="images/Burnt-Pork-Ends.jpeg" alt="Burnt Pork Ends" />
        <div class="card-content">
          <h3>Burnt Pork Ends</h3>
          <div class="tags">
            <span>Low & Slow</span>
            <span>Meat</span>
          </div>
        </div>
