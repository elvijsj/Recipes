<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulled Pork</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container recipe-page">
    <a class="back-link" href="index.html">← Back to all recipes</a>

    <img class="recipe-hero-image" src="images/Pulled-Pork.jpg" alt="Pulled Pork" />

    <h1 class="recipe-title">Pulled Pork</h1>

    <div class="recipe-meta">
      <span>Slow Cook</span>
      <span>Meat</span>
      <span>Prep: 4 h</span>
    </div>

    <div class="recipe-layout">
      <section class="recipe-box">
        <h2>Ingredients</h2>
        <ul>
          <li>Pork shoulder</li>
          <li>Salt</li>
          <li>Pepper</li>
          <li>Spices</li>
          <li>BBQ sauce</li>
        </ul>
      </section>

      <section class="recipe-box">
        <h2>Instructions</h2>
        <ol>
          <li>Season the pork well.</li>
          <li>Cook low and slow until tender.</li>
          <li>Shred the meat with forks.</li>
          <li>Mix with sauce and serve.</li>
        </ol>
      </section>
    </div>
  </main>
